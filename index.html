<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Orlando - Contemporary Art Gala</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'serif'; 
            background: linear-gradient(to bottom, #0a0a0a, #1a1a1a); 
            color: white; 
        }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        #info { 
            position: fixed; 
            top: 20px; left: 20px; 
            z-index: 10; 
            background: rgba(0,0,0,0.7); 
            padding: 20px; 
            border-radius: 10px; 
            max-width: 400px; 
            backdrop-filter: blur(10px); 
        }
        #story { 
            position: fixed; 
            bottom: 50px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 10; 
            background: rgba(255,255,255,0.95); 
            color: #333; 
            padding: 30px; 
            border-radius: 20px; 
            max-width: 600px; 
            text-align: center; 
            font-size: 1.2em; 
            line-height: 1.6; 
            display: none; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
        }
        #controls { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            z-index: 10; 
        }
        button { 
            background: rgba(255,255,255,0.2); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            margin: 5px; 
            backdrop-filter: blur(10px); 
            font-family: inherit;
        }
        button:hover { background: rgba(255,255,255,0.4); }
        h1 { margin: 0 0 10px; font-size: 2em; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        p { margin: 0 0 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h1>Crystal Orlando</h1>
        <p>Texas-based artist specializing in large-format charcoal and graphite. Walk through her gala exhibition.</p>
        <p>Use mouse to look around, WASD to move, scroll to zoom.</p>
    </div>
    <div id="story"></div>
    <div id="controls">
        <button onclick="nextStory()">Next Story</button>
    </div>

    <script>
        // Artist bio sourced from attached PDF [file:2]
        const stories = [
            "Crystal Orlando's life and art intertwine—a vibrant dance of resilience. Born in rural Central Texas, homeschooled and isolated, her fondest memories are of wild animal friends and horses. They provided escape and taught trust.",
            "Horses shaped her vision. The power of an animal that can kill in a second, yet when it loves you, pulls negativity out. She started with paper and pencil—what she could afford.",
            "In 2018, experimenting with canvas and cradleboard—large, unframed. No one else was doing it. She figured it out. Charcoal and graphite: little room for error, stark drama.",
            "Inspiration from nature's patterns and depth. Her works: animals moving forward, leaving past behind. Unapologetically bold, rising from ashes.",
            "Breast cancer in 2020: art as distraction, rethinking skills. Emerged transformed, knowing life's shortness. Hopes viewers feel empowered, see rare beauty."
        ];

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 50, 200);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('canvas'), 
            antialias: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x111111);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.1; // Prevent flipping

        // Enhanced lighting for gallery ambiance [web:9]
        const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        const spotLight = new THREE.SpotLight(0xffffff, 1, 100, Math.PI / 4, 0.5);
        spotLight.position.set(0, 20, 0);
        spotLight.target.position.set(0, 0, 0);
        spotLight.castShadow = true;
        scene.add(spotLight);
        scene.add(spotLight.target);

        // Polished marble floor
        const floorGeometry = new THREE.PlaneGeometry(200, 200);
        const floorTexture = new THREE.CanvasTexture(createMarbleTexture());
        floorTexture.wrapS = floorTexture.wrapT = THREE.RepeatWrapping;
        floorTexture.repeat.set(10, 10);
        const floorMaterial = new THREE.MeshLambertMaterial({ 
            map: floorTexture,
            transparent: true,
            opacity: 0.9
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Gallery walls/partitions
        const wallGeo = new THREE.BoxGeometry(0.3, 15, 50);
        const wallMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const walls = [
            { x: -25, rotY: 0 },
            { x: 25, rotY: Math.PI },
            { z: -30, rotY: Math.PI / 2 },
            { z: 30, rotY: -Math.PI / 2 }
        ];
        walls.forEach(w => {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(w.x || 0, 7.5, w.z || 0);
            wall.rotation.y = w.rotY;
            wall.receiveShadow = true;
            scene.add(wall);
        });

        // Artworks with better procedural charcoal simulation [file:1][web:3]
        const artworks = [];
        const positions = [
            { x: -18, z: -25, rotY: 0 },
            { x: 15, z: -20, rotY: 0.3 },
            { x: -12, z: -5, rotY: -0.2 },
            { x: 18, z: 8, rotY: 0.4 },
            { x: -5, z: 22, rotY: -0.1 }
        ];

        positions.forEach((pos, i) => {
            const artGeo = new THREE.PlaneGeometry(6, 9);
            const artTexture = createCharcoalTexture(i);
            const artMat = new THREE.MeshLambertMaterial({ 
                map: artTexture,
                side: THREE.DoubleSide
            });
            const art = new THREE.Mesh(artGeo, artMat);
            art.position.set(pos.x, 6, pos.z);
            art.rotation.y = pos.rotY;
            art.castShadow = true;
            art.receiveShadow = true;
            scene.add(art);
            artworks.push(art);

            // Spotlight per artwork
            const artLight = new THREE.SpotLight(0xffffff, 0.6, 30);
            artLight.position.set(pos.x, 15, pos.z);
            artLight.target = art;
            artLight.castShadow = true;
            scene.add(artLight);
        });

        let currentStory = 0;
        window.nextStory = () => {
            currentStory = (currentStory + 1) % stories.length;
            const storyDiv = document.getElementById('story');
            storyDiv.innerHTML = `<p>${stories[currentStory]}</p>`;
            storyDiv.style.display = 'block';
            setTimeout(() => { storyDiv.style.display = 'none'; }, 10000);
        };

        // Keyboard movement (first-person style)
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);
        const velocity = new THREE.Vector3();
        const moveSpeed = 0.15;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Smooth WASD movement
            velocity.set(0, 0, 0);
            const direction = new THREE.Vector3();
            const frontVector = new THREE.Vector3();
            camera.getWorldDirection(frontVector);
            frontVector.y = 0;
            frontVector.normalize();
            const rightVector = new THREE.Vector3();
            rightVector.crossVectors(frontVector, new THREE.Vector3(0, 1, 0)).normalize();

            if (keys['KeyW']) direction.add(frontVector);
            if (keys['KeyS']) direction.sub(frontVector);
            if (keys['KeyA']) direction.sub(rightVector);
            if (keys['KeyD']) direction.add(rightVector);

            direction.normalize().multiplyScalar(moveSpeed);
            camera.position.add(direction);

            // Gentle artwork rotation
            artworks.forEach(art => {
                art.rotation.y += 0.002;
            });

            renderer.render(scene, camera);
        }

        // Texture generators (unchanged but enhanced)
        function createMarbleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 512, 512);
            gradient.addColorStop(0, '#f8f8f8');
            gradient.addColorStop(0.5, '#e0e0e0');
            gradient.addColorStop(1, '#d0d0d0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 200; i++) {
                ctx.fillStyle = `hsl(0, 10%, ${50 + Math.sin(i) * 20}%)`;
                ctx.beginPath();
                ctx.arc(Math.random() * 512, Math.random() * 512, Math.random() * 100 + 20, 0, Math.PI * 2);
                ctx.fill();
            }
            return canvas;
        }

        function createCharcoalTexture(index) {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, 1024, 1024);

            ctx.save();
            ctx.translate(512, 512);
            ctx.scale(1.2, 1.2);
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 20;
            drawDramaticAnimal(ctx, index);
            ctx.restore();

            // Charcoal texture noise
            for (let i = 0; i < 100000; i++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.05})`;
                ctx.fillRect(Math.random() * 1024, Math.random() * 1024, 1 + Math.random() * 3, 1 + Math.random() * 3);
            }
            return canvas;
        }

        function drawDramaticAnimal(ctx, type) {
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowOffsetX = 5;
            ctx.shadowOffsetY = 5;

            switch (type % 5) {
                case 0: // Horse galloping
                    ctx.beginPath();
                    ctx.arc(150, 350, 120, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath(); // Head/neck
                    ctx.moveTo(270, 280);
                    ctx.quadraticCurveTo(350, 200, 420, 250);
                    ctx.stroke();
                    break;
                case 1: // Bison
                    ctx.beginPath();
                    ctx.ellipse(250, 420, 180, 130, 0.1, 0, Math.PI * 2);
                    ctx.stroke();
                    // Horns
                    ctx.beginPath();
                    ctx.moveTo(150, 350);
                    ctx.lineTo(80, 300);
                    ctx.lineTo(100, 320);
                    ctx.stroke();
                    break;
                case 2: // Elk
                    ctx.beginPath();
                    ctx.arc(300, 380, 160, 0, Math.PI * 2);
                    ctx.stroke();
                    // Antlers
                    ctx.beginPath();
                    ctx.moveTo(400, 250);
                    ctx.lineTo(450, 200);
                    ctx.lineTo(480, 220);
                    ctx.moveTo(400, 250);
                    ctx.lineTo(420, 180);
                    ctx.stroke();
                    break;
                case 3: // Wolf
                    ctx.beginPath();
                    ctx.moveTo(100, 400);
                    ctx.lineTo(200, 300);
                    ctx.lineTo(300, 350);
                    ctx.lineTo(400, 320);
                    ctx.lineTo(500, 380);
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case 4: // Generic wildlife
                    ctx.beginPath();
                    ctx.arc(280, 400, 140, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        nextStory(); // Auto-start first story
        animate();
    </script>
</body>
</html>
